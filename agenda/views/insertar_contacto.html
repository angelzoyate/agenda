$def with ()

<h1>Añadir Nuevo Contacto</h1>

<form method="POST" action="/insertar_contacto">
    <label>Nombre:</label>
    <input type="text" name="nombre" required><br><br>

    <label>Primer Apellido:</label>
    <input type="text" name="primer_apellido" required><br><br>

    <label>Segundo Apellido:</label>
    <input type="text" name="segundo_apellido"><br><br>

    <label>Email:</label>
    <input type="email" name="email" required><br><br>

    <label>Teléfono:</label>
    <input type="text" name="telefono" required><br><br>

    <button type="submit">Guardar Contacto</button>
    <a href="/lista_contactos"><button type="button">Cancelar</button></a>
</form>
