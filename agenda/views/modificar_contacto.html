$def with(contacto)
<h1>Editar</h1>
<form method="post">

    <label for="id_contacto">ID</label>
    <input type="text" name="id_contacto" id="id_contacto" value="$contacto['id_contacto']" readonly><br><br>

    <label for="nombre">Nombre</label>
    <input type="text" name="nombre" id="nombre" value="$contacto['nombre']"><br><br>

    <label for="primer_apellido">Primer apellido</label>
    <input type="text" name="primer_apellido" id="primer_apellido" value="$contacto['primer_apellido']"><br><br>

    <label for="segundo_apellido">Segundo apellido</label>
    <input type="text" name="segundo_apellido" id="segundo_apellido" value="$contacto['segundo_apellido']"><br><br>

    <label for="email">Email</label>
    <input type="text" name="email" id="email" value="$contacto['email']"><br><br>

    <label for="telefono">Teléfono</label>
    <input type="text" name="telefono" id="telefono" value="$contacto['telefono']"><br><br>

    <a href="/contactos">Regresar</a>
    <button name="editar">Guardar Cambios</button>
</form>
</body>
</html>
